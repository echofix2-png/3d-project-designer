<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>3D Project Designer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #f3f4f6;
      padding: 1.5rem;
      display: flex;
      justify-content: center;
    }
    .wrapper { width: 100%; max-width: 1100px; }
    h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
    p.subtitle { color: #4b5563; margin-bottom: 1rem; }
    #deck-upsell-controls {
      background: #fff;
      padding: 1rem;
      border-radius: 0.75rem;
      margin-bottom: 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }
    #deck-upsell-controls label { display: flex; gap: 0.4rem; cursor: pointer; }
    #deck-3d-container {
      width: 100%;
      height: 540px;
      background: #d1d5db;
      border-radius: 1rem;
      overflow: hidden;
      box-shadow: 0 18px 40px rgba(0,0,0,0.25);
    }
    #deck-3d-canvas { width: 100%; height: 100%; display: block; }
    .footer-note { margin-top: 0.75rem; color: #6b7280; text-align: right; }
  </style>
</head>
<body>
  <div class="wrapper">
    <h1>3D Project Designer</h1>
    <p class="subtitle">Toggle pergola, privacy screens, lighting, stairs, and railing.</p>

    <div id="deck-upsell-controls">
      <label><input type="checkbox" data-upsell="pergola" checked> Pergola</label>
      <label><input type="checkbox" data-upsell="privacy" checked> Privacy Screens</label>
      <label><input type="checkbox" data-upsell="lighting" checked> Lighting</label>
      <label><input type="checkbox" data-upsell="stairs" checked> Stairs</label>
      <label><input type="checkbox" data-upsell="railing" checked> Railing</label>
    </div>

    <div id="deck-3d-container">
      <canvas id="deck-3d-canvas"></canvas>
    </div>

    <div class="footer-note">Click + drag to orbit • Scroll to zoom</div>
  </div>

  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="https://unpkg.com/three@0.160.0/examples/js/controls/OrbitControls.js"></script>

  <script>
    (function () {
      const container = document.getElementById("deck-3d-container");
      const canvas = document.getElementById("deck-3d-canvas");
      const THREE = window.THREE;

      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.shadowMap.enabled = true;

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0xf3f4f6);

      const camera = new THREE.PerspectiveCamera(
        45,
        container.clientWidth / container.clientHeight,
        0.1,
        2000
      );
      camera.position.set(26, 18, 26);

      const controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.target.set(0, 2, 0);

      const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 0.8);
      hemi.position.set(0, 80, 0);
      scene.add(hemi);

      const sun = new THREE.DirectionalLight(0xffffff, 1.2);
      sun.position.set(60, 100, 40);
      sun.castShadow = true;
      scene.add(sun);

      const textureLoader = new THREE.TextureLoader();
      const woodTexture = textureLoader.load(
        "https://threejs.org/examples/textures/hardwood2_diffuse.jpg"
      );
      woodTexture.wrapS = woodTexture.wrapT = THREE.RepeatWrapping;
      woodTexture.repeat.set(3, 2);

      const woodMaterial = new THREE.MeshStandardMaterial({
        map: woodTexture,
        roughness: 0.55,
        metalness: 0.05,
      });

      const deckGroup = new THREE.Group();
      scene.add(deckGroup);

      const layout = {
        levels: [
          { width: 18, depth: 12, height: 2, x: 0, z: 0 }
        ]
      };

      window.deckUpsells = {
        pergola: true,
        privacy: true,
        lighting: true,
        stairs: true,
        railing: true,
      };

      function updateDeck() {
        deckGroup.clear();

        layout.levels.forEach((lvl) => {
          const geom = new THREE.BoxGeometry(lvl.width, 0.6, lvl.depth);
          const deck = new THREE.Mesh(geom, woodMaterial);
          deck.position.set(lvl.x, lvl.height, lvl.z);
          deck.castShadow = true;
          deckGroup.add(deck);
        });
      }

      updateDeck();

      function animate() {
        const rect = container.getBoundingClientRect();
        renderer.setSize(rect.width, rect.height, false);
        camera.aspect = rect.width / rect.height;
        camera.updateProjectionMatrix();
        controls.update();
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }
      animate();
    })();
  </script>
</body>
</html>
